name = "discord-companion-bot"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[durable_objects.bindings]]
name = "COMPANION_BOT"
class_name = "CompanionBot"

[[services]]
binding = "CONTINUITY"
service = "continuity-worker"

[[services]]
binding = "HAVEN"
service = "haven"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CompanionBot"]

[triggers]
crons = ["* * * * *"]

